name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Install Supply-Chain Firewall
        run: pip install .
      - name: Test firewall CLI
        run: make test-cli

  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Install Supply-Chain Firewall
        run: pip install .
      - name: Test firewall configure script
        run: make test-configure

  python-executable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Install Supply-Chain Firewall
        run: pip install .
      - name: Test Python executable in the global environment
        run: make test-python-executable
      - name: Test Python executable in a virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate
          make test-python-executable

  pip-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pip-version: ["22.2", "22.3", "23.0", "23.1", "23.2", "23.3", "24.0", "24.1", "24.2", "24.3", "25.0", "25.1", "25.2", "25.3", "26.0"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install pip==${{ matrix.pip-version }}
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Install Supply-Chain Firewall
        run: pip install .
      - name: Test firewall pip integration
        run: |
          make test-pip
          make test-pip-class

  poetry-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        poetry-version: ["1.7.0", "1.8.0", "2.0.0", "2.1.0", "2.2.0", "2.3.0"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
      - name: Install Poetry
        run: |
          pip install poetry==${{ matrix.poetry-version }}
          if [ "${{ matrix.poetry-version }}" = "1.7.0" ] || [ "${{ matrix.poetry-version }}" = "1.8.0" ]; then
            # Known issue with virtualenv 20.31.x breaking these Poetry versions
            pip install virtualenv==20.30.0
          fi
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Install Supply-Chain Firewall
        run: pip install .
      - name: Test firewall Poetry integration
        run: |
          make test-poetry
          make test-poetry-class

  npm-integration:
    name: npm-integration (${{ matrix.npm-version }})
    runs-on: ubuntu-latest
    strategy:
